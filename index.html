<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
:root{--bg:#030712;--s1:rgba(17,24,39,0.4);--s2:rgba(31,41,55,0.5);--b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.15);--t1:#f8fafc;--t2:#cbd5e1;--t3:#94a3b8;--t4:#64748b;--ac:#06b6d4;--acbg:rgba(6,182,212,0.12);--gn:#10b981;--rd:#f43f5e;--yl:#f59e0b;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}

.mo{background:rgba(17,24,39,0.85);border-radius:28px 28px 0 0;padding:30px 24px calc(var(--sb) + 30px);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;border:1px solid var(--b2);border-bottom:none;animation:su .4s cubic-bezier(.16,1,.3,1)}

.mo-t{font-size:20px;font-weight:800;margin-bottom:20px}.fl{display:block;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 6px}
.cdb{background:rgba(0,0,0,0.3);padding:16px;border-radius:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2);line-height:1.6;overflow:auto;max-height:400px;white-space:pre-wrap;word-break:break-word;border:1px solid var(--b1)}
.chat-a{display:flex;flex-direction:column;height:calc(100dvh - 200px)}.chat-m{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-bottom:12px}

.qr{display:flex;gap:8px;overflow-x:auto;padding:10px 0;flex-shrink:0}.qr::-webkit-scrollbar{display:none}
.dots{display:flex;gap:5px;padding:12px 16px;background:rgba(255,255,255,0.03);border-radius:20px;align-self:flex-start;border:1px solid var(--b1)}
.dt{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:dp 1.4s infinite both}.dt:nth-child(1){animation-delay:-.32s}.dt:nth-child(2){animation-delay:-.16s}

.bar-c{display:flex;align-items:flex-end;gap:8px;height:80px;padding-top:10px}.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-v{font-size:9px;color:var(--t1);font-family:'JetBrains Mono',monospace;font-weight:700}.bar{width:100%;max-width:36px;border-radius:6px 6px 0 0;min-height:4px;position:relative;overflow:hidden}
.bar::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,0.5)}.bar-lb{font-size:9px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;max-width:100%}

.empty-s{text-align:center;padding:40px 20px;color:var(--t4);font-size:14px;background:rgba(255,255,255,0.02);border-radius:16px;border:1px dashed var(--b1)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:.5px}
.badge.real{background:rgba(16,185,129,0.15);color:var(--gn);border:1px solid rgba(16,185,129,0.3)}
.badge.local{background:rgba(245,158,11,0.15);color:var(--yl);border:1px solid rgba(245,158,11,0.3)}

<body>
<div id="app"></div>
<script>
const A=(()=>{
let S={tab:'dash',profile:{name:'',email:'',currency:'USD',taxRate:.3,apiKey:''},txns:[],chatMsgs:[],emailResults:[],showSettings:false,showTxnForm:false,showImport:false,finFilter:'all',finSearch:'',emailQ:'',profileSetup:false};
let _u=0;const uid=()=>'t'+(++_u)+'_'+Date.now();const $=s=>document.querySelector(s);
const fmt=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:S.profile.currency||'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const fmtF=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:S.profile.currency||'USD'}).format(n);
const fmtD=d=>{try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch{return d}};
const hasAPI=()=>!!S.profile.apiKey?.trim();
const ic={dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',fin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',mail:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>',ai:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M16 14H8a4 4 0 0 0-4 4v2h16v-2a4 4 0 0 0-4-4z"/></svg>',rep:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>',send:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>',up:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><polyline points="5,12 12,5 19,12"/></svg>',dn:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="2.5"><polyline points="19,12 12,19 5,12"/></svg>',plus:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',search:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',dl:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',gear:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',scan:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 7V2h5"/><path d="M17 2h5v5"/><path d="M22 17v5h-5"/><path d="M7 22H2v-5"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',trash:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',upload:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'};
const ECAT=['Moradia','Transporte','Alimentação','Saúde','Educação','Lazer','Roupas','Assinaturas','Utilities','Seguros','Dívidas','Investimento','Outros'];
const ICAT=['Salário','Freelance','Investimento','Presente','Reembolso','Venda','Outros'];
const TABS=[{id:'dash',l:'Home',ic:ic.dash},{id:'fin',l:'Finanças',ic:ic.fin},{id:'email',l:'E-mail',ic:ic.mail},{id:'ai',l:'IA',ic:ic.ai},{id:'rep',l:'Reports',ic:ic.rep}];

function calc(){const t=S.txns,inc=t.filter(x=>x.type==='in').reduce((s,x)=>s+x.amount,0),exp=t.filter(x=>x.type==='out').reduce((s,x)=>s+x.amount,0),net=inc-exp,tax=net>0?net*S.profile.taxRate:0,netA=net-tax,margin=inc>0?(net/inc*100):0,today=new Date().toISOString().split('T')[0],tIn=t.filter(x=>x.type==='in'&&x.date===today).reduce((s,x)=>s+x.amount,0),tOut=t.filter(x=>x.type==='out'&&x.date===today).reduce((s,x)=>s+x.amount,0),byCat={},bySrc={},months={};t.filter(x=>x.type==='out').forEach(x=>{byCat[x.cat]=(byCat[x.cat]||0)+x.amount});t.filter(x=>x.type==='in').forEach(x=>{bySrc[x.cat]=(bySrc[x.cat]||0)+x.amount});t.forEach(x=>{const m=x.date?.substring(0,7);if(m){if(!months[m])months[m]={in:0,out:0};months[m][x.type==='in'?'in':'out']+=x.amount;}});return{inc,exp,net,tax,netA,margin,tIn,tOut,byCat,bySrc,months,count:t.length};}
function save(){try{localStorage.setItem('bcc3',JSON.stringify({txns:S.txns,profile:S.profile,chatMsgs:S.chatMsgs.slice(-50)}))}catch{}}
function load(){try{const d=JSON.parse(localStorage.getItem('bcc3'));if(d){if(d.txns)S.txns=d.txns;if(d.profile)S.profile={...S.profile,...d.profile};if(d.chatMsgs)S.chatMsgs=d.chatMsgs;if(S.profile.name)S.profileSetup=true;}}catch{}}
function barChart(data,color,h=65){const mx=Math.max(...data.map(d=>d.v),1);return'<div class="bar-c" style="height:'+h+'px">'+data.map(d=>'<div class="bar-col"><div class="bar-v">'+fmt(d.v).replace(/[\$R€]/g,'')+'</div><div class="bar" style="height:'+Math.max((d.v/mx)*(h-24),4)+'px;background:linear-gradient(180deg,'+color+','+color+'44)"></div><div class="bar-lb">'+d.l+'</div></div>').join('')+'</div>';}

// ═══ SMART LOCAL AI ═══
function localAI(q,f){const nm=S.profile.name?.split(' ')[0]||'';const t=q.toLowerCase();const topE=Object.entries(f.byCat).sort((a,b)=>b[1]-a[1]);const topS=Object.entries(f.bySrc).sort((a,b)=>b[1]-a[1]);const E=f.exp||1;
if(f.count===0)return(nm||'Amigo')+', você ainda não tem transações! Adicione na aba Finanças ou importe um CSV do banco.';
if(t.includes('resumo')||t.includes('overview')||t.includes('completo')){let r='📊 Panorama'+(nm?' de '+nm:'')+':\n\n💰 Receita: '+fmtF(f.inc)+'\n💸 Despesas: '+fmtF(f.exp)+'\n📈 Lucro bruto: '+fmtF(f.net)+' (margem '+f.margin.toFixed(1)+'%)\n🏛️ Imposto: '+fmtF(f.tax)+'\n✅ Líquido: '+fmtF(f.netA)+'\n\n';r+=f.margin>30?'Excelente margem! 🎯':(f.margin>15?'Margem saudável, mas dá pra melhorar.':'⚠️ Margem baixa — atenção!');return r;}
if(t.includes('cortar')||t.includes('gastos')||t.includes('economizar')||t.includes('reduzir')){if(!topE.length)return'Sem despesas pra analisar!';let r='🔍 Análise de gastos:\n\n';topE.forEach(([c,v])=>{const p=(v/E*100).toFixed(1);r+=(p>40?'🚨 ':p>25?'⚠️ ':'✅ ')+c+': '+fmtF(v)+' ('+p+'%)'+(p>40?' — Revise urgente!':p>25?' — Espaço pra otimizar':'')+'\n';});r+='\n💡 Cortar 15% da maior despesa = economia de '+fmtF(topE[0][1]*0.15)+'/período.';return r;}
if(t.includes('investir')||t.includes('investimento')){const d=f.netA;if(d<=0)return'Lucro líquido negativo. Foque em equilibrar antes de investir.';return'💰 Análise de investimento:\n\nDisponível: '+fmtF(d)+'\n\n1️⃣ Reserva emergência: '+fmtF(f.exp*3)+' (3 meses)\n2️⃣ Renda fixa: 40-50% do lucro\n3️⃣ ETFs/Ações: 20-30%\n4️⃣ Alternativas: 10-20%\n\nSugestão: '+fmtF(d*0.2)+'/período em investimentos (20% do lucro).';}
if(t.includes('previsão')||t.includes('projeção')||t.includes('mês')){const md=Object.entries(f.months).sort((a,b)=>a[0].localeCompare(b[0]));if(!md.length)return'Preciso de dados pra projetar!';const last=md[md.length-1];let r='📅 Projeção:\n\nÚltimo período ('+last[0]+'): Receita '+fmtF(last[1].in)+', Despesa '+fmtF(last[1].out)+'\n';if(md.length>=2){const prev=md[md.length-2];r+='Tendência receita: '+((last[1].in-prev[1].in)/Math.max(prev[1].in,1)*100).toFixed(1)+'%\n';}r+='\nProjeção mensal: Lucro '+fmtF(last[1].in-last[1].out);return r;}
if(t.includes('padrão')||t.includes('padrões')||t.includes('análise')){let r='🧠 Padrões:\n\n'+f.count+' transações\n';if(topE.length)r+='Maior gasto: '+topE[0][0]+' ('+(topE[0][1]/E*100).toFixed(0)+'%)\n';if(topS.length)r+='Maior fonte: '+topS[0][0]+'\n';r+='Ticket médio: '+fmtF((f.inc+f.exp)/f.count)+'\n\n';r+=f.margin>25?'✅ Saúde: BOA':(f.margin>10?'⚠️ Saúde: ATENÇÃO':'🚨 Saúde: CRÍTICA');return r;}
return'Seus números: Receita '+fmtF(f.inc)+', Despesas '+fmtF(f.exp)+', Líquido '+fmtF(f.netA)+' ('+f.margin.toFixed(1)+'% margem).\n\n'+(hasAPI()?'':'💡 Com API Key, as respostas ficam muito mais inteligentes!\n\n')+'Pergunte: resumo, cortar gastos, investir, previsão, ou análise.';}

// ═══ CSV IMPORT ═══
function importCSV(file){if(!file)return;const st=$('#imp-status');if(st)st.innerHTML='<p style="color:var(--ac)">Processando...</p>';const r=new FileReader();r.onload=function(e){try{const lines=e.target.result.split('\n').filter(l=>l.trim());if(lines.length<2){if(st)st.innerHTML='<p style="color:var(--rd)">Arquivo vazio</p>';return;}let imp=0;for(let i=1;i<lines.length;i++){const vals=lines[i].split(/[,;|\t]/).map(v=>v.trim().replace(/^"|"$/g,''));if(vals.length<2)continue;let date='',desc='',amount=0,type='out';vals.forEach(v=>{const dmy=v.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);const ymd=v.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);if(ymd)date=ymd[1]+'-'+ymd[2].padStart(2,'0')+'-'+ymd[3].padStart(2,'0');else if(dmy)date=dmy[3]+'-'+dmy[2].padStart(2,'0')+'-'+dmy[1].padStart(2,'0');else{const cl=v.replace(/[R$€\s]/g,'').replace(/\./g,'X').replace(',','.').replace(/X/g,'');const n=parseFloat(cl);if(!isNaN(n)&&v.match(/[\d]/)){amount=Math.abs(n);type=n>0?'in':'out';}else if(v.length>2&&isNaN(parseFloat(v)))desc=desc?desc+' '+v:v;}});if(amount>0&&desc){if(!date)date=new Date().toISOString().split('T')[0];S.txns.push({id:uid(),type,cat:'Outros',desc:desc.substring(0,60),amount,date});imp++;}}save();if(st)st.innerHTML='<div class="cd" style="border-color:rgba(16,185,129,.2);background:rgba(16,185,129,.05)"><p style="color:var(--gn)">✅ '+imp+' transações importadas!</p></div>';setTimeout(()=>{S.showImport=false;render();},2000);}catch(err){if(st)st.innerHTML='<p style="color:var(--rd)">'+err.message+'</p>';}};r.readAsText(file);}

// ═══ EMAIL ═══
async function srchE(q){if(q)S.emailQ=q;const el=$('#e-res');if(el)el.innerHTML='<p style="color:var(--t3);font-size:12px;padding:8px">Buscando...</p>';if(hasAPI()){try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.profile.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:'Search Gmail: "'+(S.emailQ||'recent')+'". Summarize in Portuguese.'}],mcp_servers:[{type:'url',url:'https://gmail.mcp.claude.com/mcp',name:'gmail'}]})});const d=await r.json();S.emailResults=[d.content?.map(c=>c.text||'').filter(Boolean).join('\n')||'Sem resultados.'];}catch(e){S.emailResults=['❌ '+e.message];}}else{await new Promise(r=>setTimeout(r,500));S.emailResults=['📧 Email requer API Key. Configure nas Settings.'];}render();}
async function scanE(){const btn=$('#sc-btn'),res=$('#sc-res');if(btn){btn.innerHTML='⏳...';btn.disabled=true;}await new Promise(r=>setTimeout(r,800));if(res)res.innerHTML='<div class="cd" style="margin-top:10px;border-color:rgba(245,158,11,.2)"><p style="color:var(--yl);font-size:12px">Scanner requer Gmail MCP'+(hasAPI()?'':' + API Key')+'.</p></div>';if(btn){btn.innerHTML=ic.scan+' Escanear';btn.disabled=false;}}

// ═══ AI ═══
async function aiSend(preset){const input=$('#ci'),text=preset||(input?input.value.trim():'');if(!text)return;if(!preset&&input)input.value='';const nm=S.profile.name?.split(' ')[0]||'';if(!S.chatMsgs.length)S.chatMsgs.push({role:'bot',text:'Olá'+(nm?', '+nm:'')+' 👋\nPergunta o que quiser!'});S.chatMsgs.push({role:'user',text});render();const cl=$('#cl');if(cl)cl.style.display='block';const cs=$('#cs');if(cs)cs.scrollTop=cs.scrollHeight;const f=calc();
if(hasAPI()){const ctx='DADOS: Receita '+fmtF(f.inc)+', Despesas '+fmtF(f.exp)+', Líquido '+fmtF(f.netA)+', Margem '+f.margin.toFixed(1)+'%. Top despesas: '+Object.entries(f.byCat).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,v])=>k+': '+fmtF(v)+' ('+(v/(f.exp||1)*100).toFixed(0)+'%)').join(', ')+'. Fontes: '+Object.entries(f.bySrc).map(([k,v])=>k+': '+fmtF(v)).join(', ')+'. Últimas: '+S.txns.slice(0,10).map(t=>(t.type==='in'?'+':'-')+fmtF(t.amount)+' '+t.desc).join('; ');
try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.profile.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:'Assistente financeiro pessoal de '+S.profile.name+'. Fale como humano, direto, empático. Use dados reais. Max 200 palavras.\n\n'+ctx,messages:[{role:'user',content:text}]})});const d=await r.json();const reply=d.content?.map(c=>c.text||'').filter(Boolean).join('\n');if(reply)S.chatMsgs.push({role:'bot',text:reply});else if(d.error)S.chatMsgs.push({role:'bot',text:'⚠️ API: '+d.error.message});else S.chatMsgs.push({role:'bot',text:'Resposta vazia. Tenta de novo?'});}catch(e){S.chatMsgs.push({role:'bot',text:'❌ '+e.message});}}
else{await new Promise(r=>setTimeout(r,500));S.chatMsgs.push({role:'bot',text:localAI(text,f)});}save();render();}

// ═══ REPORTS ═══
function dlTxt(){const t=$('#rep-txt')?.textContent||'';const b=new Blob([t],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='relatorio_'+new Date().toISOString().split('T')[0]+'.txt';a.click();}
function dlCsv(){const h='Data,Tipo,Categoria,Descricao,Valor\n';const r=S.txns.map(t=>t.date+','+(t.type==='in'?'Entrada':'Saída')+','+t.cat+',"'+t.desc+'",'+t.amount).join('\n');const b=new Blob([h+r],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='transacoes_'+new Date().toISOString().split('T')[0]+'.csv';a.click();}

})();
