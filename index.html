<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BizCommand">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060a10">
<meta name="description" content="Business Command Center — AI-Powered Financial Dashboard">
<title>Business Command Center</title>

<!-- PWA Manifest (inline via blob) -->
<script>
const manifest = {
  name: "Business Command Center",
  short_name: "BizCommand",
  description: "AI-Powered Financial & Email Dashboard",
  start_url: "./",
  display: "standalone",
  background_color: "#060a10",
  theme_color: "#060a10",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='90' fill='%23060a10'/><text x='256' y='340' text-anchor='middle' font-size='280' fill='%2300e5ff'>⚡</text></svg>", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const link = document.createElement('link');
link.rel = 'manifest';
link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

<!-- iOS Icons -->
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%23060a10'/><text x='90' y='125' text-anchor='middle' font-size='100' fill='%2300e5ff'>⚡</text></svg>">

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  --bg: #060a10;
  --bg2: #0b1018;
  --bg3: #101820;
  --border: #141e2a;
  --border2: #1e2a38;
  --text: #d0d8e4;
  --text2: #8892a4;
  --text3: #4b5c6e;
  --text4: #3a4a5e;
  --cyan: #00e5ff;
  --blue: #0066ff;
  --green: #00e676;
  --red: #ff5c8a;
  --yellow: #ffc107;
  --cyan-bg: rgba(0, 229, 255, 0.08);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { 
  height: 100%; overflow: hidden; 
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

input, select, textarea {
  font-family: inherit; font-size: 16px; /* Prevents iOS zoom */
  color: var(--text); background: var(--bg);
  border: 1px solid var(--border2); border-radius: 10px;
  padding: 12px 14px; width: 100%; outline: none;
  -webkit-appearance: none;
}
input::placeholder { color: var(--text4); }
select { color: var(--text2); }
select option { background: var(--bg2); }
button { font-family: inherit; cursor: pointer; border: none; outline: none; -webkit-appearance: none; }
button:active { transform: scale(0.97); }
button:disabled { opacity: 0.5; pointer-events: none; }

/* ─── APP SHELL ─── */
#app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  overflow: hidden;
}

/* ─── HEADER ─── */
.header {
  padding: calc(var(--safe-t) + 12px) 16px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0; z-index: 10;
}
.header-title { font-size: 18px; font-weight: 800; color: #fff; }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.header-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
.gear-btn { background: none; color: var(--text3); padding: 8px; border-radius: 8px; }
.gear-btn:active { background: var(--bg3); }

/* ─── CONTENT ─── */
.content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 16px; padding-bottom: calc(80px + var(--safe-b));
  -webkit-overflow-scrolling: touch;
}

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  display: flex; justify-content: space-around; align-items: center;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 6px 4px calc(var(--safe-b) + 6px);
  flex-shrink: 0; z-index: 10;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 2px; padding: 6px 8px; border-radius: 10px;
  background: none; color: var(--text3); font-size: 10px; font-weight: 600;
  transition: color 0.15s;
  min-width: 56px;
}
.nav-item.active { color: var(--cyan); }
.nav-item svg { transition: transform 0.15s; }
.nav-item.active svg { transform: scale(1.1); }
.nav-icon { width: 22px; height: 22px; }

/* ─── CARDS ─── */
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 12px;
}
.card-title {
  font-size: 11px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
}

/* ─── KPI GRID ─── */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.kpi { padding: 14px; border-radius: 12px; background: var(--bg2); border: 1px solid var(--border); }
.kpi-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
.kpi-value { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }
.kpi-sub { font-size: 10px; color: var(--text4); margin-top: 2px; }
.kpi-icon { float: right; font-size: 16px; }

/* ─── BUTTONS ─── */
.btn-primary {
  padding: 11px 18px; border-radius: 10px;
  background: linear-gradient(135deg, var(--cyan-bg), rgba(0,102,255,0.15));
  color: var(--cyan); font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-accent {
  padding: 11px 18px; border-radius: 10px;
  background: linear-gradient(135deg, var(--cyan), #0088ff);
  color: #000; font-size: 13px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-secondary {
  padding: 11px 18px; border-radius: 10px;
  background: transparent; border: 1px solid var(--border2);
  color: var(--text3); font-size: 13px; font-weight: 500;
}
.chip {
  padding: 7px 14px; border-radius: 20px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text3); font-size: 12px; white-space: nowrap;
}
.chip.active { background: var(--cyan-bg); border-color: rgba(0,229,255,0.25); color: var(--cyan); }

/* ─── TRANSACTION ROW ─── */
.txn-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px; border-radius: 10px;
  background: var(--bg); border: 1px solid var(--border);
  margin-bottom: 6px;
}
.txn-desc { font-size: 13px; font-weight: 500; color: var(--text); }
.txn-meta { font-size: 11px; color: var(--text3); }
.txn-amount { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; white-space: nowrap; margin-left: auto; }

/* ─── CHAT ─── */
.chat-area { display: flex; flex-direction: column; height: calc(100dvh - 180px); }
.chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 10px; }
.msg { max-width: 85%; padding: 12px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg-user { align-self: flex-end; background: linear-gradient(135deg, rgba(0,229,255,0.12), rgba(0,102,255,0.12)); border: 1px solid rgba(0,229,255,0.2); }
.msg-bot { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); }
.chat-input-row { display: flex; gap: 8px; padding-top: 8px; flex-shrink: 0; }
.send-btn { width: 46px; height: 46px; border-radius: 12px; background: linear-gradient(135deg, var(--cyan), #0088ff); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.quick-row { display: flex; gap: 6px; overflow-x: auto; padding: 8px 0; flex-shrink: 0; }

/* ─── CODE BLOCK ─── */
.code-block {
  background: var(--bg); padding: 14px; border-radius: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text3); line-height: 1.5; overflow: auto;
  max-height: 400px; white-space: pre; border: 1px solid var(--border);
}

/* ─── OVERLAY / MODAL ─── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px); display: flex;
  align-items: flex-end; justify-content: center; z-index: 100;
}
.modal {
  background: var(--bg2); border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(var(--safe-b) + 24px);
  width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
  border: 1px solid var(--border); border-bottom: none;
}
.modal-title { font-size: 17px; font-weight: 800; color: #fff; margin-bottom: 20px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; margin-top: 14px; }

/* ─── BAR CHART ─── */
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding-top: 8px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar-val { font-size: 8px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.bar { width: 100%; max-width: 36px; border-radius: 4px 4px 0 0; transition: height 0.4s ease; min-height: 3px; }
.bar-label { font-size: 8px; color: var(--text4); white-space: nowrap; max-width: 48px; overflow: hidden; text-overflow: ellipsis; }

/* ─── SCAN CATEGORIES ─── */
.scan-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 12px; }
.scan-cat { background: var(--bg); border-radius: 10px; padding: 12px; border: 1px solid var(--border); }
.scan-cat-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
.scan-item { padding: 6px 0; border-bottom: 1px solid var(--border); }
.scan-item:last-child { border: none; }
.scan-item-subject { font-size: 12px; color: var(--text); font-weight: 500; }
.scan-item-from { font-size: 10px; color: var(--text4); }

/* ─── GROSS VS NET ─── */
.gvn { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: center; text-align: center; margin-top: 10px; }
.gvn-block { flex: 1; min-width: 80px; }
.gvn-label { font-size: 9px; color: var(--text3); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.gvn-value { font-size: 17px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.gvn-op { font-size: 20px; color: var(--text3); padding: 0 2px; }

/* ─── LOADING DOTS ─── */
.loading-dots { display: flex; gap: 4px; padding: 8px 14px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); animation: dotPulse 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }

/* ─── INSTALL BANNER ─── */
.install-banner {
  background: linear-gradient(135deg, var(--cyan-bg), rgba(0,102,255,0.1));
  border: 1px solid rgba(0,229,255,0.2); border-radius: 12px;
  padding: 14px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.install-banner p { font-size: 12px; color: var(--text2); flex: 1; }
.install-banner strong { color: var(--cyan); }

/* ─── ANIMATIONS ─── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.35s ease forwards; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// BUSINESS COMMAND CENTER — MOBILE PWA
// ═══════════════════════════════════════════════════════════════

const APP = (() => {
  // ─── STATE ───
  let state = {
    tab: 'dashboard',
    settings: {
      companyName: 'SUA EMPRESA',
      ownerEmail: 'boss@empresa.com',
      currency: 'USD',
      taxRate: 0.30,
    },
    txns: [
      { id: 't1', type: 'income', category: 'Service', desc: 'Residential Landscaping - Johnson', amount: 4500, date: '2026-03-10', client: 'Johnson' },
      { id: 't2', type: 'income', category: 'Contract', desc: 'Commercial Maintenance - Plaza Corp', amount: 8200, date: '2026-03-09', client: 'Plaza Corp' },
      { id: 't3', type: 'income', category: 'Service', desc: 'Tree Removal - Smith', amount: 2800, date: '2026-03-08', client: 'Smith' },
      { id: 't4', type: 'expense', category: 'Payroll', desc: 'Employee Wages - Week 10', amount: 6500, date: '2026-03-07' },
      { id: 't5', type: 'expense', category: 'Equipment', desc: 'New Mower Blades + Oil', amount: 890, date: '2026-03-06' },
      { id: 't6', type: 'expense', category: 'Fuel', desc: 'Fleet Fuel - 3 Trucks', amount: 1240, date: '2026-03-05' },
      { id: 't7', type: 'expense', category: 'Insurance', desc: 'Monthly Liability Insurance', amount: 750, date: '2026-03-01' },
      { id: 't8', type: 'income', category: 'Service', desc: 'Hardscape Installation - Davis', amount: 12500, date: '2026-03-04', client: 'Davis' },
      { id: 't9', type: 'expense', category: 'Materials', desc: 'Pavers + Gravel Delivery', amount: 3200, date: '2026-03-03' },
      { id: 't10', type: 'expense', category: 'Fuel', desc: 'Diesel Refill - Excavator', amount: 480, date: '2026-03-02' },
      { id: 't11', type: 'income', category: 'Consultation', desc: 'Design Consultation - Rivera', amount: 1500, date: '2026-03-01', client: 'Rivera' },
    ],
    chatMsgs: [],
    emailResults: [],
    scanResult: null,
    showSettings: false,
    showTxnForm: false,
    finFilter: 'all',
    finSearch: '',
    emailQuery: '',
  };

  let _uid = 100;
  const uid = () => 't_' + (++_uid);
  const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
  const fmtFull = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
  const fmtDate = (d) => new Date(d+'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  // ─── CALC FINANCIALS ───
  function calcFin() {
    const txns = state.txns;
    const inc = txns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const exp = txns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const net = inc - exp;
    const tax = net > 0 ? net * state.settings.taxRate : 0;
    const netAfter = net - tax;
    const margin = inc > 0 ? (net / inc * 100) : 0;
    const today = new Date().toISOString().split('T')[0];
    const todayIn = txns.filter(t => t.type === 'income' && t.date === today).reduce((s, t) => s + t.amount, 0);
    const todayOut = txns.filter(t => t.type === 'expense' && t.date === today).reduce((s, t) => s + t.amount, 0);
    const byCat = {};
    txns.filter(t => t.type === 'expense').forEach(t => { byCat[t.category] = (byCat[t.category] || 0) + t.amount; });
    const byClient = {};
    txns.filter(t => t.type === 'income').forEach(t => { byClient[t.client || 'Other'] = (byClient[t.client || 'Other'] || 0) + t.amount; });
    return { inc, exp, net, tax, netAfter, margin, todayIn, todayOut, byCat, byClient, count: txns.length };
  }

  // ─── SAVE/LOAD LOCALSTORAGE ───
  function save() {
    try { localStorage.setItem('bcc_data', JSON.stringify({ txns: state.txns, settings: state.settings })); } catch {}
  }
  function load() {
    try {
      const d = JSON.parse(localStorage.getItem('bcc_data'));
      if (d) { if (d.txns) state.txns = d.txns; if (d.settings) state.settings = { ...state.settings, ...d.settings }; }
    } catch {}
  }

  // ─── SVG ICONS ───
  const icons = {
    dash: `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>`,
    money: `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
    mail: `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>`,
    bot: `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="11"/></svg>`,
    report: `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
    send: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>`,
    up: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00e676" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>`,
    down: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff5c8a" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19,12 12,19 5,12"/></svg>`,
    gear: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,
    download: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
    scan: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 7V2h5"/><path d="M17 2h5v5"/><path d="M22 17v5h-5"/><path d="M7 22H2v-5"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
    trash: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>`,
    plus: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
    search: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  };

  // ─── BAR CHART HELPER ───
  function barChart(data, color, height = 80) {
    const max = Math.max(...data.map(d => d.v), 1);
    return `<div class="bar-chart" style="height:${height}px">${data.map(d => 
      `<div class="bar-col">
        <div class="bar-val">${fmt(d.v).replace('$','')}</div>
        <div class="bar" style="height:${Math.max((d.v/max)*(height-30),3)}px;background:linear-gradient(180deg,${color},${color}44)"></div>
        <div class="bar-label">${d.l}</div>
      </div>`
    ).join('')}</div>`;
  }

  // ═══════════════════════════════════════════════════════════════
  // RENDER FUNCTIONS
  // ═══════════════════════════════════════════════════════════════

  function renderDashboard() {
    const f = calcFin();

  // ═══════════════════════════════════════════════════════════════
  // MAIN RENDER
  // ═══════════════════════════════════════════════════════════════
  function render() {
    const tabs = [
      { id: 'dashboard', label: 'Dashboard', icon: icons.dash },
      { id: 'finances', label: 'Finanças', icon: icons.money },
      { id: 'email', label: 'E-mail', icon: icons.mail },
      { id: 'agent', label: 'IA Agent', icon: icons.bot },
      { id: 'reports', label: 'Reports', icon: icons.report },
    ];
    const tabLabels = { dashboard: 'Dashboard', finances: 'Finanças', email: 'E-mail Hub', agent: 'Agente IA', reports: 'Relatórios' };
    let content = '';
    switch (state.tab) {
      case 'dashboard': content = renderDashboard(); break;
      case 'finances': content = renderFinances(); break;
      case 'email': content = renderEmail(); break;
      case 'agent': content = renderAgent(); break;
      case 'reports': content = renderReports(); break;
    }

    const dateStr = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    $('#app').innerHTML = `
      <div class="header">
        <div>
          <div class="header-title">⚡ ${tabLabels[state.tab]}</div>
          <div class="header-sub">${state.settings.companyName} · ${dateStr}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="header-status"><div class="status-dot"></div>Ativo</div>
          <button class="gear-btn" onclick="APP.openSettings()">${icons.gear}</button>
        </div>
      </div>
      <div class="content" id="main-content">${content}</div>
      <nav class="bottom-nav">
        ${tabs.map(t => `<button class="nav-item ${state.tab===t.id?'active':''}" onclick="APP.setTab('${t.id}')">${t.icon}<span>${t.label}</span></button>`).join('')}
      </nav>
      ${renderSettings()}
    `;

    // Scroll chat to bottom
    const cs = $('#chat-scroll');
    if (cs) cs.scrollTop = cs.scrollHeight;

    // Update type-dependent categories in form
    const typeSelect = $('#txn-type');
    if (typeSelect) {
      typeSelect.onchange = function() {
        const cats = this.value === 'income' ? INCOME_CATS : EXPENSE_CATS;
        const catSel = $('#txn-cat');
        catSel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
      };

  // ACTIONS
  // ═══════════════════════════════════════════════════════════════

  function setTab(t) { state.tab = t; render(); }
  function setFinFilter(f) { state.finFilter = f; render(); }
  function setFinSearch(v) { state.finSearch = v; render(); }
  function toggleTxnForm() { state.showTxnForm = !state.showTxnForm; render(); }
  function openSettings() { state.showSettings = true; render(); }
  function closeSettings() { state.showSettings = false; render(); }

  function addTxn() {
    const type = $('#txn-type').value;
    const cat = $('#txn-cat').value;
    const desc = $('#txn-desc').value;
    const amount = parseFloat($('#txn-amount').value);
    const date = $('#txn-date').value;
    const client = $('#txn-client').value;
    if (!desc || !amount) return alert('Preencha descrição e valor');
    state.txns.push({ id: uid(), type, category: cat, desc, amount, date, client });
    state.showTxnForm = false;
    save(); render();
  }

  function delTxn(id) {
    state.txns = state.txns.filter(t => t.id !== id);
    save(); render();
  }

  function saveSettings() {
    state.settings.companyName = $('#set-name').value;
    state.settings.ownerEmail = $('#set-email').value;
    state.settings.taxRate = parseFloat($('#set-tax').value) / 100;
    state.showSettings = false;
    save(); render();
  }

  // ─── EMAIL ───
  async function searchEmail(q) {
    if (q) state.emailQuery = q;
    const query = state.emailQuery || 'recent emails';
    const el = $('#email-results');
    if (el) el.innerHTML = '<p style="color:var(--text3);font-size:12px;padding:10px">Buscando...</p>';
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 1000,
          messages: [{ role: 'user', content: `Search my Gmail for: "${query}". Return the most relevant results.` }],
          mcp_servers: [{ type: 'url', url: 'https://gmail.mcp.claude.com/mcp', name: 'gmail' }],
        }),
      });
      const data = await res.json();
      const text = data.content?.map(c => c.text || c.content?.[0]?.text || '').filter(Boolean).join('\n') || 'Nenhum resultado.';
      state.emailResults = [text];
    } catch { state.emailResults = ['❌ Erro ao buscar. Verifique a conexão Gmail.']; }
    render();
  }

  async function scanEmails() {
    const btn = $('#scan-btn');
    const results = $('#scan-results');
    if (btn) btn.innerHTML = '⏳ Escaneando...';
    if (btn) btn.disabled = true;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 1000,
          system: 'You are a business email analyzer. Search the user\'s Gmail and categorize recent emails into 3 categories. Return ONLY a JSON object: {"payments":[{"from":"...","subject":"..."}],"leads":[{"from":"...","subject":"..."}],"opportunities":[{"from":"...","subject":"..."}]}',
          messages: [{ role: 'user', content: 'Search my recent emails from the past 7 days and categorize them.' }],
          mcp_servers: [{ type: 'url', url: 'https://gmail.mcp.claude.com/mcp', name: 'gmail' }],
        }),
      });
      const data = await res.json();
      const allText = data.content?.map(c => c.text || '').filter(Boolean).join('\n') || '';
      let parsed;
      try { const m = allText.match(/\{[\s\S]*\}/); parsed = m ? JSON.parse(m[0]) : null; } catch { parsed = null; }
      
      if (parsed && (parsed.payments || parsed.leads || parsed.opportunities)) {
        const cats = [
          { title: '💳 Pagamentos', data: parsed.payments || [], color: 'var(--green)' },
          { title: '🎯 Leads', data: parsed.leads || [], color: 'var(--cyan)' },
          { title: '🤝 Oportunidades', data: parsed.opportunities || [], color: 'var(--yellow)' },
        ];
        if (results) results.innerHTML = `<div class="scan-grid">${cats.map(c => `
          <div class="scan-cat" style="border-color:${c.color}22">
            <div class="scan-cat-title" style="color:${c.color}">${c.title} (${c.data.length})</div>
            ${c.data.length ? c.data.map(e => `<div class="scan-item"><div class="scan-item-subject">${e.subject||'—'}</div><div class="scan-item-from">${e.from||''}</div></div>`).join('') : '<p style="color:var(--text4);font-size:11px">Nenhum encontrado</p>'}
          </div>
        `).join('')}</div>`;
      } else {
        if (results) results.innerHTML = `<div class="code-block" style="margin-top:12px">${allText || 'Nenhum resultado.'}</div>`;
      }
    } catch {
      if (results) results.innerHTML = '<p style="color:var(--red);font-size:12px;margin-top:10px">❌ Erro ao escanear.</p>';
    }
    if (btn) { btn.innerHTML = `${icons.scan} Escanear E-mails`; btn.disabled = false; }
  }

  // ─── AI AGENT ───
  async function agentSend(preset) {
    const input = $('#chat-input');
    const text = preset || (input ? input.value.trim() : '');
    if (!text) return;
    if (!preset && input) input.value = '';
    
    if (state.chatMsgs.length === 0) {
      state.chatMsgs.push({ role: 'bot', text: `Olá! Sou o Assistente Financeiro IA da ${state.settings.companyName}.\n\nTenho acesso a todos os números em tempo real!` });
    }
    state.chatMsgs.push({ role: 'user', text });
    render();
    
    const loading = $('#chat-loading');
    if (loading) loading.style.display = 'block';
    const cs = $('#chat-scroll');
    if (cs) cs.scrollTop = cs.scrollHeight;

    const f = calcFin();
    const context = `COMPANY FINANCIALS:\nGross Revenue: ${fmtFull(f.inc)}\nExpenses: ${fmtFull(f.exp)}\nNet Before Tax: ${fmtFull(f.net)}\nTax (${(state.settings.taxRate*100).toFixed(0)}%): ${fmtFull(f.tax)}\nNet After Tax: ${fmtFull(f.netAfter)}\nMargin: ${f.margin.toFixed(1)}%\n\nExpenses by Cat:\n${Object.entries(f.byCat).map(([k,v])=>k+': '+fmtFull(v)).join('\n')}\n\nRevenue by Client:\n${Object.entries(f.byClient).map(([k,v])=>k+': '+fmtFull(v)).join('\n')}\n\nRecent Transactions:\n${state.txns.slice(0,10).map(t=>`[${t.type}] ${t.desc} - ${fmtFull(t.amount)} (${t.date})`).join('\n')}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 1000,
          system: `You are the Financial AI Assistant for ${state.settings.companyName}. Answer in the same language the user writes. Be direct and use the data below.\n\n${context}`,
          messages: [{ role: 'user', content: text }],
        }),
      });
      const data = await res.json();
      const reply = data.content?.map(c => c.text || '').filter(Boolean).join('\n') || 'Erro ao processar.';
      state.chatMsgs.push({ role: 'bot', text: reply });
    } catch {
      state.chatMsgs.push({ role: 'bot', text: '❌ Erro de conexão.' });
    }
    render();
  }

  // ─── REPORTS ───
  function getReportText() {
    const f = calcFin();
    return `DAILY FINANCIAL REPORT - ${state.settings.companyName}\n${new Date().toLocaleDateString()}\n\nGross Revenue: ${fmtFull(f.inc)}\nExpenses: ${fmtFull(f.exp)}\nNet Before Tax: ${fmtFull(f.net)}\nTax: ${fmtFull(f.tax)}\nNet After Tax: ${fmtFull(f.netAfter)}\nMargin: ${f.margin.toFixed(1)}%\n\nExpenses:\n${Object.entries(f.byCat).map(([k,v])=>k+': '+fmtFull(v)).join('\n')}\n\nRevenue:\n${Object.entries(f.byClient).map(([k,v])=>k+': '+fmtFull(v)).join('\n')}\n\nTransactions:\n${state.txns.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=>t.date+' '+(t.type==='income'?'+':'-')+fmtFull(t.amount)+' '+t.desc).join('\n')}`;
  }

  function downloadTxt() {
    const text = $('#report-text')?.textContent || getReportText();
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `report_${new Date().toISOString().split('T')[0]}.txt`; a.click();
  }

  function downloadCsv() {
    const header = 'Date,Type,Category,Description,Amount,Client\n';
    const rows = state.txns.map(t => `${t.date},${t.type},${t.category},"${t.desc}",${t.amount},${t.client||''}`).join('\n');
    const blob = new Blob([header + rows], { type: 'text/csv' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `transactions_${new Date().toISOString().split('T')[0]}.csv`; a.click();
  }

  async function emailReport() {
    const btn = $('#report-email-btn');
    const status = $('#report-status');
    if (btn) btn.innerHTML = '⏳ Enviando...';
    if (btn) btn.disabled = true;
    try {
      await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 1000,
          messages: [{ role: 'user', content: `Create a Gmail draft to ${state.settings.ownerEmail} with subject "Daily Report - ${state.settings.companyName} - ${new Date().toLocaleDateString()}" and body:\n\n${getReportText()}` }],
          mcp_servers: [{ type: 'url', url: 'https://gmail.mcp.claude.com/mcp', name: 'gmail' }],
        }),
      });
      if (status) status.innerHTML = '<div class="card" style="border-color:rgba(0,230,118,0.2);background:rgba(0,230,118,0.05);margin-bottom:12px"><p style="color:var(--green);font-size:13px">✅ Draft criado no Gmail!</p></div>';
    } catch {
      if (status) status.innerHTML = '<p style="color:var(--red);font-size:12px;margin-bottom:10px">❌ Erro ao criar draft.</p>';
    }
    if (btn) { btn.innerHTML = `${icons.mail} Email Draft`; btn.disabled = false; }
  }

  // ─── INIT ───
  function init() {
    load();
    render();
    // Register SW for offline (if hosted)
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      // For a single-file PWA, we'd need to create a SW blob
      // This works when hosted on GitHub Pages with a separate sw.js
    }
  }

  return {
    init, render, setTab, setFinFilter, setFinSearch, toggleTxnForm, addTxn, delTxn,
    openSettings, closeSettings, saveSettings,
    searchEmail, scanEmails, agentSend,
    downloadTxt, downloadCsv, emailReport,
    state,
  };
})();

// Boot
document.addEventListener('DOMContentLoaded', APP.init);
</script>
</body>
